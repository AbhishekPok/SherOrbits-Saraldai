<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SherOrbit — Coming Soon</title>
    <meta name="description" content="SherOrbit — Technology, Education, Marketing. Something amazing is on its way.">
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #1B2A4A;
            --navy-deep: #0F1B33;
            --orange: #F5A623;
            --orange-light: #FFB84D;
            --orange-glow: rgba(245, 166, 35, 0.3);
            --white: #FFFFFF;
            --gray: #8B95A5;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--navy-deep);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* === ANIMATED BACKGROUND === */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-grid::before {
            content: '';
            position: absolute;
            inset: -50%;
            background-image:
                linear-gradient(rgba(245, 166, 35, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(245, 166, 35, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridDrift 20s linear infinite;
        }

        @keyframes gridDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(60px, 60px) rotate(1deg); }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--orange-glow), transparent 70%);
            top: -100px;
            right: -100px;
            animation: float1 12s ease-in-out infinite;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(27, 42, 74, 0.8), transparent 70%);
            bottom: -50px;
            left: -50px;
            animation: float2 15s ease-in-out infinite;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--orange-glow), transparent 70%);
            bottom: 20%;
            right: 10%;
            animation: float3 10s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-40px, 60px) scale(1.1); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -40px) scale(1.15); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, -50px) scale(0.9); }
        }

        /* Orbiting particle ring */
        .orbit-ring {
            position: fixed;
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            animation: spinSlow 30s linear infinite;
        }

        .orbit-ring .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--orange);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--orange-glow);
        }

        .orbit-ring .dot:nth-child(1) { top: 0; left: 50%; }
        .orbit-ring .dot:nth-child(2) { top: 50%; right: 0; }
        .orbit-ring .dot:nth-child(3) { bottom: 0; left: 50%; }
        .orbit-ring .dot:nth-child(4) { top: 50%; left: 0; }

        @keyframes spinSlow {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* === MAIN CONTENT === */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 700px;
            width: 100%;
        }

        /* Logo */
        .logo-wrap {
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
        }

        .logo-wrap img {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 0 30px var(--orange-glow));
            animation: logoPulse 4s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 20px var(--orange-glow)); }
            50% { filter: drop-shadow(0 0 40px rgba(245, 166, 35, 0.5)); }
        }

        /* Heading */
        .heading {
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.5s forwards;
        }

        .heading span {
            background: linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Tagline */
        .tagline {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: var(--gray);
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.8s forwards;
        }

        /* Countdown */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 1.1s forwards;
        }

        .countdown-item {
            text-align: center;
        }

        .countdown-num {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            color: var(--orange);
            line-height: 1;
            display: block;
            min-width: 70px;
            position: relative;
        }

        .countdown-num::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 2px;
            background: var(--orange);
            opacity: 0.3;
            border-radius: 1px;
        }

        .countdown-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--gray);
            margin-top: 12px;
            display: block;
        }

        /* Services pills */
        .services {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 1.4s forwards;
        }

        .pill {
            padding: 0.5rem 1.25rem;
            border: 1px solid rgba(245, 166, 35, 0.25);
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--orange-light);
            background: rgba(245, 166, 35, 0.05);
            transition: all 0.3s ease;
        }

        .pill:hover {
            background: rgba(245, 166, 35, 0.15);
            border-color: var(--orange);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 166, 35, 0.15);
        }

        /* Email form */
        .notify-form {
            display: flex;
            gap: 0;
            max-width: 440px;
            margin: 0 auto 2rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 1.7s forwards;
            border-radius: 100px;
            overflow: hidden;
            border: 1px solid rgba(245, 166, 35, 0.2);
            background: rgba(15, 27, 51, 0.6);
            backdrop-filter: blur(10px);
            transition: border-color 0.3s ease;
        }

        .notify-form:focus-within {
            border-color: var(--orange);
            box-shadow: 0 0 20px rgba(245, 166, 35, 0.1);
        }

        .notify-form input {
            flex: 1;
            padding: 0.9rem 1.5rem;
            background: transparent;
            border: none;
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        .notify-form input::placeholder {
            color: var(--gray);
        }

        .notify-form button {
            padding: 0.9rem 1.75rem;
            background: linear-gradient(135deg, var(--orange), var(--orange-light));
            border: none;
            color: var(--navy-deep);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .notify-form button:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 20px var(--orange-glow);
        }

        /* Social links */
        .socials {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 2s forwards;
        }

        .socials a {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .socials a:hover {
            border-color: var(--orange);
            color: var(--orange);
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(245, 166, 35, 0.15);
        }

        .socials a svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Footer */
        .footer {
            position: relative;
            z-index: 1;
            margin-top: 3rem;
            padding-bottom: 2rem;
            font-size: 0.75rem;
            color: rgba(139, 149, 165, 0.5);
            letter-spacing: 0.05em;
            opacity: 0;
            animation: fadeUp 1s ease-out 2.2s forwards;
        }

        /* Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 500px) {
            .countdown { gap: 1rem; }
            .countdown-num { min-width: 50px; }
            .notify-form {
                flex-direction: column;
                border-radius: 16px;
            }
            .notify-form button {
                border-radius: 0 0 16px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orbit-ring">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <!-- Content -->
    <main class="container">

            <div class="countdown-item">
                <span class="countdown-num" id="minutes">00</span>

            </div>
            <div class="countdown-item">
                <span class="countdown-num" id="seconds">00</span>

        </div>

        <div class="services">

        <div class="notify-form" role="form">

        <div class="socials">

            </a>
        </div>
    </main>

    <footer class="footer">
        &copy; 2026 SherOrbit. All rights reserved.
    </footer>

    <script>
        // === COUNTDOWN TIMER ===
        // 15 days from the moment the page first loads
        const STORAGE_KEY = 'sherorbit_launch';
        let launchDate;
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            launchDate = parseInt(stored, 10);
        } else {
            launchDate = Date.now() + 15 * 24 * 60 * 60 * 1000;
            localStorage.setItem(STORAGE_KEY, launchDate);
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = launchDate - now;

            if (diff <= 0) {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // === NOTIFY BUTTON ===
        function handleNotify() {
            const email = document.getElementById('email').value;
            if (!email || !email.includes('@')) {
                alert('Please enter a valid email address.');
                return;
            }
            // Replace this with your actual form handler (Formspree, Google Forms, etc.)
            alert('Thanks! We\'ll notify you at ' + email + ' when we launch.');
            document.getElementById('email').value = '';
        }

        // Allow Enter key to submit
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleNotify();
        });
    </script>
</body>
</html>
